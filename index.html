<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0a0f1e"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="לוחמים"/>
<title>פרויקט לוחמים</title>
<link rel="manifest" href="manifest.json"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8cc7a;
  --gold-dim: rgba(201,168,76,0.15);
  --navy: #0a0f1e;
  --navy-mid: #111827;
  --navy-card: #161d30;
  --navy-border: rgba(201,168,76,0.2);
  --text: #f0ead6;
  --text-dim: rgba(240,234,214,0.55);
  --green: #2ecc71;
  --green-dim: rgba(46,204,113,0.15);
  --red: #e74c3c;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--navy); color:var(--text); font-family:'Heebo',sans-serif; overflow-x:hidden; }

/* BG pattern */
body::before {
  content:'';
  position:fixed; inset:0;
  background: radial-gradient(ellipse at 20% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 100%, rgba(201,168,76,0.05) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}

.app { position:relative; z-index:1; max-width:430px; margin:0 auto; min-height:100vh; padding-bottom:100px; }

/* HEADER */
.header {
  padding:24px 20px 16px;
  border-bottom:1px solid var(--navy-border);
  background:linear-gradient(180deg, rgba(10,15,30,0.98) 0%, transparent 100%);
  position:sticky; top:0; z-index:100;
  backdrop-filter:blur(20px);
}
.header-top { display:flex; justify-content:space-between; align-items:center; }
.logo { font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--gold); letter-spacing:2px; }
.logo span { color:var(--text-dim); font-size:13px; font-family:'Heebo',sans-serif; font-weight:300; letter-spacing:0; display:block; margin-top:-4px; }
.date-chip {
  background:var(--gold-dim); border:1px solid var(--navy-border);
  border-radius:20px; padding:6px 14px;
  font-size:12px; color:var(--gold-light); font-weight:500;
}
.progress-bar-wrap { margin-top:14px; }
.progress-label { display:flex; justify-content:space-between; font-size:11px; color:var(--text-dim); margin-bottom:6px; }
.progress-track { height:4px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:4px; transition:width 0.6s cubic-bezier(.4,0,.2,1); }

/* SECTION LABEL */
.section-label {
  font-size:10px; letter-spacing:2px; color:var(--gold);
  text-transform:uppercase; padding:20px 20px 8px;
  font-weight:700;
}

/* MEAL CARD */
.meal-card {
  margin:0 12px 10px;
  background:var(--navy-card);
  border:1px solid var(--navy-border);
  border-radius:16px;
  overflow:hidden;
  transition:transform 0.2s, box-shadow 0.2s;
}
.meal-card.done { border-color:rgba(46,204,113,0.3); }
.meal-card.done .meal-header { opacity:0.6; }

.meal-header {
  display:flex; align-items:center; gap:14px;
  padding:16px;
  cursor:pointer;
}
.meal-icon {
  width:44px; height:44px; border-radius:12px;
  background:var(--gold-dim); border:1px solid var(--navy-border);
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.meal-icon.done-icon { background:var(--green-dim); border-color:rgba(46,204,113,0.3); }
.meal-info { flex:1; min-width:0; }
.meal-name { font-size:15px; font-weight:700; color:var(--text); }
.meal-time { font-size:12px; color:var(--gold); margin-top:2px; }
.meal-kcal { font-size:11px; color:var(--text-dim); margin-top:1px; }
.meal-status {
  width:32px; height:32px; border-radius:50%;
  border:2px solid var(--navy-border);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0;
  transition:all 0.3s;
}
.meal-status.done { background:var(--green); border-color:var(--green); }

/* MEAL BODY */
.meal-body { padding:0 16px 16px; display:none; }
.meal-body.open { display:block; }
.meal-items { margin-bottom:14px; }
.meal-item {
  display:flex; justify-content:space-between;
  font-size:13px; color:var(--text-dim);
  padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.05);
}
.meal-item:last-child { border:none; }
.meal-item strong { color:var(--text); }

/* PHOTO REQUIRED */
.photo-section { margin-top:4px; }
.photo-required-label {
  font-size:11px; color:var(--gold); font-weight:700;
  letter-spacing:1px; text-transform:uppercase; margin-bottom:8px;
  display:flex; align-items:center; gap:6px;
}
.photo-required-label::before { content:'📸'; }
.photo-upload-btn {
  width:100%; padding:12px;
  background:var(--gold-dim); border:1.5px dashed var(--gold);
  border-radius:12px; color:var(--gold-light);
  font-size:13px; font-family:'Heebo',sans-serif; font-weight:500;
  cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.photo-upload-btn:active { transform:scale(0.98); }
.photo-preview {
  width:100%; height:160px; border-radius:12px;
  object-fit:cover; border:1px solid var(--navy-border); display:none;
}
.photo-preview.visible { display:block; }

/* DONE BTN */
.done-btn {
  width:100%; margin-top:12px; padding:14px;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  border:none; border-radius:12px;
  color:var(--navy); font-size:15px; font-weight:900;
  font-family:'Heebo',sans-serif; cursor:pointer;
  transition:all 0.2s; letter-spacing:0.5px;
}
.done-btn:active { transform:scale(0.97); }
.done-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
.done-btn.whatsapp { background:linear-gradient(135deg,#25d366,#128c7e); color:#fff; margin-top:8px; font-size:13px; }

/* WEIGH CARD */
.weigh-card {
  margin:0 12px 10px;
  background:linear-gradient(135deg,rgba(201,168,76,0.1),rgba(201,168,76,0.05));
  border:1px solid var(--gold);
  border-radius:16px; padding:18px;
}
.weigh-title { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--gold); letter-spacing:1px; margin-bottom:4px; }
.weigh-sub { font-size:12px; color:var(--text-dim); margin-bottom:14px; }
.weigh-input-row { display:flex; gap:10px; margin-bottom:12px; }
.weigh-input {
  flex:1; padding:12px 14px;
  background:rgba(0,0,0,0.3); border:1px solid var(--navy-border);
  border-radius:10px; color:var(--text); font-size:16px;
  font-family:'Heebo',sans-serif; text-align:center;
}
.weigh-input:focus { outline:none; border-color:var(--gold); }
.weigh-unit { display:flex; align-items:center; padding:0 12px; color:var(--gold); font-weight:700; }
.photo-row { display:flex; gap:8px; margin-bottom:12px; }
.photo-slot {
  flex:1; height:90px; border-radius:10px;
  background:rgba(0,0,0,0.3); border:1.5px dashed var(--navy-border);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:11px; color:var(--text-dim); gap:4px; cursor:pointer;
  transition:border-color 0.2s; overflow:hidden; position:relative;
}
.photo-slot.has-photo { border-style:solid; border-color:var(--gold); }
.photo-slot img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.photo-slot span { position:relative; z-index:1; }

/* NOTIFY PERMISSION */
.notify-banner {
  margin:12px 12px 0;
  background:rgba(201,168,76,0.1); border:1px solid var(--gold);
  border-radius:14px; padding:14px 16px;
  display:flex; align-items:center; gap:12px;
}
.notify-banner p { flex:1; font-size:13px; color:var(--text); line-height:1.5; }
.notify-btn {
  padding:9px 16px; background:var(--gold); border:none;
  border-radius:8px; color:var(--navy); font-weight:700;
  font-family:'Heebo',sans-serif; font-size:13px; cursor:pointer; white-space:nowrap;
}

/* TOAST */
.toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--navy-card); border:1px solid var(--navy-border);
  border-radius:12px; padding:12px 20px;
  font-size:13px; color:var(--text); z-index:999;
  opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast.gold { border-color:var(--gold); color:var(--gold); }
.toast.green { border-color:var(--green); color:var(--green); }

/* BOTTOM NAV */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0;
  background:rgba(10,15,30,0.95); backdrop-filter:blur(20px);
  border-top:1px solid var(--navy-border);
  display:flex; max-width:430px; margin:0 auto;
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center;
  padding:10px 0 14px; gap:4px; cursor:pointer;
  font-size:10px; color:var(--text-dim); font-weight:500;
  transition:color 0.2s;
}
.nav-item.active { color:var(--gold); }
.nav-item .nav-icon { font-size:20px; }

/* VIEWS */
.view { display:none; }
.view.active { display:block; }

/* HISTORY */
.history-empty { text-align:center; padding:60px 20px; color:var(--text-dim); font-size:14px; }
.history-entry {
  margin:0 12px 10px; padding:14px 16px;
  background:var(--navy-card); border:1px solid var(--navy-border);
  border-radius:14px;
}
.history-date { font-size:11px; color:var(--gold); font-weight:700; margin-bottom:6px; }
.history-row { display:flex; justify-content:space-between; font-size:13px; color:var(--text-dim); padding:2px 0; }
.history-photos { display:flex; gap:8px; margin-top:8px; }
.history-photos img { width:60px; height:60px; border-radius:8px; object-fit:cover; }
</style>
</head>
<body>

<div class="app">

  <!-- NOTIFY BANNER -->
  <div class="notify-banner" id="notifyBanner" style="display:none">
    <span style="font-size:24px">🔔</span>
    <p>אפשר התראות כדי לקבל תזכורות לארוחות ושקילה</p>
    <button class="notify-btn" onclick="requestNotifications()">אישור</button>
  </div>

  <!-- VIEW: TODAY -->
  <div class="view active" id="viewToday">
    <div class="header">
      <div class="header-top">
        <div class="logo">פרויקט לוחמים <span>Alpha Protocol</span></div>
        <div class="date-chip" id="dateChip"></div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-label">
          <span>התקדמות יומית</span>
          <span id="progressText">0 / 4 ארוחות</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>
    </div>

    <!-- WEIGH CARD -->
    <div class="section-label">⚖️ שקילה יומית</div>
    <div class="weigh-card" id="weighCard">
      <div class="weigh-title">שקילה + תמונות גוף</div>
      <div class="weigh-sub">כל יום 06:00 — בלי חולצה</div>
      <div class="weigh-input-row">
        <input class="weigh-input" type="number" id="weightInput" placeholder="75.5" step="0.1" min="40" max="200"/>
        <div class="weigh-unit">ק"ג</div>
      </div>
      <div class="photo-row">
        <div class="photo-slot" id="frontSlot" onclick="triggerWeighPhoto('front')">
          <span style="font-size:22px">📸</span>
          <span>פרונטלי</span>
        </div>
        <div class="photo-slot" id="sideSlot" onclick="triggerWeighPhoto('side')">
          <span style="font-size:22px">📸</span>
          <span>צד</span>
        </div>
      </div>
      <input type="file" id="weighPhotoInput" accept="image/*" capture="environment" style="display:none" onchange="handleWeighPhoto(event)"/>
      <button class="done-btn" onclick="sendWeighToWhatsApp()">שלח לאפק ⚡</button>
    </div>

    <!-- MEALS -->
    <div class="section-label">🍽️ ארוחות היום</div>
    <div id="mealsContainer"></div>

    <!-- hidden file input for meal photos -->
    <input type="file" id="mealPhotoInput" accept="image/*" capture="environment" style="display:none" onchange="handleMealPhoto(event)"/>
  </div>

  <!-- VIEW: HISTORY -->
  <div class="view" id="viewHistory">
    <div class="header">
      <div class="header-top">
        <div class="logo">היסטוריה <span>מעקב שבועי</span></div>
      </div>
    </div>
    <div id="historyContainer" style="padding-top:8px"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item active" id="navToday" onclick="switchView('today')">
      <div class="nav-icon">🏠</div>
      <span>היום</span>
    </div>
    <div class="nav-item" id="navHistory" onclick="switchView('history')">
      <div class="nav-icon">📊</div>
      <span>היסטוריה</span>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===================== DATA =====================
const MEALS = [
  {
    id: 'pre',
    name: 'לפני אימון — פרי + קפה',
    time: '06:00',
    icon: '🍎',
    kcal: '~90 kcal',
    requiresPhoto: false,
    notifyText: 'זמן לפרי + קפה לפני אימון! ☕🍎',
    items: [
      { label: 'תפוח / בננה / תפוז / קלמנטינה', val: '1 יחידה' },
      { label: 'קפה שחור / אספרסו', val: 'לפי בחירה' }
    ]
  },
  {
    id: 'meal1',
    name: 'ארוחה 1 — שייק + שקדים',
    time: '09:30',
    icon: '🥛',
    kcal: '~445 kcal',
    requiresPhoto: true,
    notifyText: 'ארוחה 1! שייק חלבון + פרי + שקדים 💪',
    items: [
      { label: 'מעדן חלבון / סקופ חלבון', val: '30g חלבון' },
      { label: 'פרי 1', val: 'תפוח / תמרים / קלמנטינה / בננה' },
      { label: 'שקדים', val: '30g' }
    ]
  },
  {
    id: 'meal2',
    name: 'ארוחה 2 — צהריים',
    time: '13:45',
    icon: '🍗',
    kcal: '~720 kcal',
    requiresPhoto: true,
    notifyText: 'ארוחת צהריים! עוף / בשר / דג + פחמימה 🍗🍚',
    items: [
      { label: 'חזה עוף / שייטל / דג אמנון', val: '200g' },
      { label: 'פסטה יבש / אורז מבושל', val: '150g / 200g' },
      { label: 'ברוקולי + שעועית ירוקה + ירקות', val: '100g+100g' },
      { label: 'מיץ אשכולית סחוט', val: '250ml' }
    ]
  },
  {
    id: 'meal3',
    name: 'ארוחה 3 — טונה + סלט',
    time: '20:30',
    icon: '🥗',
    kcal: '~260 kcal',
    requiresPhoto: true,
    notifyText: 'ארוחה 3! טונה + סלט 🐟🥗',
    items: [
      { label: 'טונה במים', val: '160g (1 פחית)' },
      { label: 'סלט ירקות', val: '3–4 סוגים' },
      { label: 'קטשופ + מיונז', val: 'כף כל אחד' }
    ]
  },
  {
    id: 'meal4',
    name: 'ארוחה 4 — ביצים + קוטג׳',
    time: '21:00',
    icon: '🍳',
    kcal: '~430 kcal',
    requiresPhoto: true,
    notifyText: 'ארוחה 4! ביצים + קוטג׳ + פריכיות 🍳',
    items: [
      { label: '3 ביצים שלמות', val: '~210 kcal' },
      { label: 'קוטג׳ 5%', val: '150g' },
      { label: 'פריכיות', val: '5 יח׳' },
      { label: '2 ירקות לבחירה', val: '200g' }
    ]
  }
];

const WEIGH_NOTIFY_HOUR = 6;
const WEIGH_NOTIFY_MIN = 0;
const WHATSAPP_RECIPIENT = '972509060929';
const WHATSAPP_SENDER = '972542580471';

// ===================== STATE =====================
let state = JSON.parse(localStorage.getItem('lohamim_state') || '{}');
let todayKey = getTodayKey();
if (!state[todayKey]) state[todayKey] = { meals: {}, weigh: null, photos: {} };
let currentMealPhotoId = null;
let currentWeighPhotoType = null;
let weighPhotos = { front: null, side: null };

// ===================== INIT =====================
document.addEventListener('DOMContentLoaded', () => {
  updateDateChip();
  renderMeals();
  updateProgress();
  registerSW();
  checkNotifyPermission();
  scheduleAllNotifications();
  renderHistory();
});

function getTodayKey() {
  return new Date().toISOString().split('T')[0];
}

function saveState() {
  localStorage.setItem('lohamim_state', JSON.stringify(state));
}

// ===================== DATE =====================
function updateDateChip() {
  const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const months = ['ינו','פבר','מרץ','אפר','מאי','יונ','יול','אוג','ספט','אוק','נוב','דצ'];
  const d = new Date();
  document.getElementById('dateChip').textContent =
    `יום ${days[d.getDay()]} • ${d.getDate()} ${months[d.getMonth()]}`;
}

// ===================== RENDER MEALS =====================
function renderMeals() {
  const container = document.getElementById('mealsContainer');
  container.innerHTML = '';
  const dayData = state[todayKey];

  MEALS.forEach((meal, idx) => {
    const done = !!dayData.meals[meal.id];
    const photo = dayData.photos[meal.id];

    const card = document.createElement('div');
    card.className = `meal-card${done ? ' done' : ''}`;
    card.id = `card_${meal.id}`;

    const itemsHTML = meal.items.map(i =>
      `<div class="meal-item"><span>${i.label}</span><strong>${i.val}</strong></div>`
    ).join('');

    const photoSection = meal.requiresPhoto ? `
      <div class="photo-section">
        <div class="photo-required-label">חובה תמונת ארוחה</div>
        ${photo
          ? `<img src="${photo}" class="photo-preview visible" id="preview_${meal.id}"/>`
          : `<button class="photo-upload-btn" onclick="triggerMealPhoto('${meal.id}')">
              <span>📷</span> צלם / העלה תמונה
             </button>
             <img src="" class="photo-preview" id="preview_${meal.id}"/>`
        }
      </div>` : '';

    const canDone = !meal.requiresPhoto || !!photo;
    const doneSection = done ? '' : `
      ${photoSection}
      <button class="done-btn" id="doneBtn_${meal.id}"
        ${canDone ? '' : 'disabled'}
        onclick="markDone('${meal.id}')">
        ✅ סיימתי
      </button>
      ${meal.requiresPhoto && photo ? `
        <button class="done-btn whatsapp" onclick="sendToWhatsApp('${meal.id}')">
          📲 שלח לאפק בוואטסאפ
        </button>` : ''}
    `;

    card.innerHTML = `
      <div class="meal-header" onclick="toggleCard('${meal.id}')">
        <div class="meal-icon ${done ? 'done-icon' : ''}">${done ? '✅' : meal.icon}</div>
        <div class="meal-info">
          <div class="meal-name">${meal.name}</div>
          <div class="meal-time">⏰ ${meal.time}</div>
          <div class="meal-kcal">${meal.kcal}</div>
        </div>
        <div class="meal-status ${done ? 'done' : ''}">${done ? '✓' : '○'}</div>
      </div>
      <div class="meal-body" id="body_${meal.id}">
        <div class="meal-items">${itemsHTML}</div>
        ${done
          ? `<div style="text-align:center;color:var(--green);font-weight:700;font-size:14px;padding:8px 0">✅ בוצע!</div>
             ${photo ? `<img src="${photo}" class="photo-preview visible"/>
             <button class="done-btn whatsapp" style="margin-top:8px" onclick="sendToWhatsApp('${meal.id}')">📲 שלח לאפק בוואטסאפ</button>` : ''}`
          : doneSection
        }
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleCard(id) {
  const body = document.getElementById(`body_${id}`);
  body.classList.toggle('open');
}

// ===================== PROGRESS =====================
function updateProgress() {
  const dayData = state[todayKey];
  const done = Object.keys(dayData.meals).length;
  const total = MEALS.length;
  document.getElementById('progressText').textContent = `${done} / ${total} ארוחות`;
  document.getElementById('progressFill').style.width = `${(done/total)*100}%`;
}

// ===================== PHOTO =====================
function triggerMealPhoto(mealId) {
  currentMealPhotoId = mealId;
  document.getElementById('mealPhotoInput').value = '';
  document.getElementById('mealPhotoInput').click();
}

function handleMealPhoto(e) {
  const file = e.target.files[0];
  if (!file || !currentMealPhotoId) return;
  const reader = new FileReader();
  reader.onload = ev => {
    state[todayKey].photos[currentMealPhotoId] = ev.target.result;
    saveState();
    renderMeals();
    // open card
    setTimeout(() => {
      const body = document.getElementById(`body_${currentMealPhotoId}`);
      if (body) body.classList.add('open');
    }, 50);
    showToast('תמונה נשמרה! ✅', 'green');
  };
  reader.readAsDataURL(file);
}

// ===================== MARK DONE =====================
function markDone(mealId) {
  const meal = MEALS.find(m => m.id === mealId);
  if (meal.requiresPhoto && !state[todayKey].photos[mealId]) {
    showToast('חובה להעלות תמונה קודם 📸', 'gold');
    return;
  }
  state[todayKey].meals[mealId] = { time: new Date().toISOString() };
  saveState();
  updateProgress();
  renderMeals();
  showToast(`${meal.name} — בוצע! 💪`, 'green');
  // auto-open to show WhatsApp btn
  setTimeout(() => {
    const body = document.getElementById(`body_${mealId}`);
    if (body) body.classList.add('open');
  }, 100);
}

// ===================== WHATSAPP =====================
function sendToWhatsApp(mealId) {
  const photo = state[todayKey].photos[mealId];
  const msg = encodeURIComponent('בוצע');
  const url = `https://wa.me/${WHATSAPP_RECIPIENT}?text=${msg}`;
  window.open(url, '_blank');
  if (photo) {
    showToast('וואטסאפ נפתח — שתף את התמונה ידנית', 'gold');
  }
}

// ===================== WEIGH =====================
let activeWeighSlot = null;
function triggerWeighPhoto(type) {
  activeWeighSlot = type;
  document.getElementById('weighPhotoInput').value = '';
  document.getElementById('weighPhotoInput').click();
}

function handleWeighPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    weighPhotos[activeWeighSlot] = ev.target.result;
    const slot = document.getElementById(activeWeighSlot === 'front' ? 'frontSlot' : 'sideSlot');
    slot.classList.add('has-photo');
    slot.innerHTML = `<img src="${ev.target.result}"/><span style="position:relative;z-index:1;color:#fff;font-size:10px;background:rgba(0,0,0,0.5);padding:2px 6px;border-radius:4px">${activeWeighSlot === 'front' ? 'פרונטלי ✓' : 'צד ✓'}</span>`;
    showToast('תמונה נשמרה ✅', 'green');
  };
  reader.readAsDataURL(file);
}

function sendWeighToWhatsApp() {
  const weight = document.getElementById('weightInput').value;
  if (!weight) { showToast('נא להכניס משקל 🔢', 'gold'); return; }
  const today = new Date();
  const dateStr = `${today.getDate()}/${today.getMonth()+1}/${today.getFullYear()}`;
  const msg = encodeURIComponent(`📅 ${dateStr}\n⚖️ משקל: ${weight} ק"ג\nבוצע`);
  const url = `https://wa.me/${WHATSAPP_RECIPIENT}?text=${msg}`;
  window.open(url, '_blank');
  // save
  state[todayKey].weigh = { weight, date: today.toISOString() };
  saveState();
  renderHistory();
  showToast('נתוני שקילה נשלחו! ⚖️', 'green');
}

// ===================== SERVICE WORKER =====================
function registerSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
}

// ===================== NOTIFICATIONS =====================
function checkNotifyPermission() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    document.getElementById('notifyBanner').style.display = 'flex';
  }
}

function requestNotifications() {
  Notification.requestPermission().then(p => {
    document.getElementById('notifyBanner').style.display = 'none';
    if (p === 'granted') {
      showToast('התראות הופעלו! 🔔', 'green');
      scheduleAllNotifications();
    }
  });
}

function scheduleAllNotifications() {
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();

  // Schedule meal notifications
  MEALS.forEach(meal => {
    const [h, m] = meal.time.split(':').map(Number);
    const target = new Date();
    target.setHours(h, m, 0, 0);
    if (target > now) {
      const delay = target - now;
      setTimeout(() => {
        if (!state[getTodayKey()]?.meals[meal.id]) {
          new Notification('פרויקט לוחמים 🏆', {
            body: meal.notifyText,
            icon: '⚔️',
            badge: '⚔️',
            tag: meal.id
          });
        }
      }, delay);
    }
  });

  // Schedule weigh notification at 06:00
  const weighTarget = new Date();
  weighTarget.setHours(WEIGH_NOTIFY_HOUR, WEIGH_NOTIFY_MIN, 0, 0);
  if (weighTarget <= now) weighTarget.setDate(weighTarget.getDate() + 1);
  const weighDelay = weighTarget - now;
  setTimeout(() => {
    new Notification('פרויקט לוחמים ⚖️', {
      body: '06:00 — זמן לשקילה + 2 תמונות גוף! 📸',
      tag: 'weigh'
    });
    // reschedule for next day
    setTimeout(() => scheduleAllNotifications(), 60000);
  }, weighDelay);
}

// ===================== VIEWS =====================
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (view === 'today') {
    document.getElementById('viewToday').classList.add('active');
    document.getElementById('navToday').classList.add('active');
  } else {
    document.getElementById('viewHistory').classList.add('active');
    document.getElementById('navHistory').classList.add('active');
    renderHistory();
  }
}

// ===================== HISTORY =====================
function renderHistory() {
  const container = document.getElementById('historyContainer');
  const keys = Object.keys(state).sort().reverse();
  if (!keys.length) {
    container.innerHTML = '<div class="history-empty">אין היסטוריה עדיין 📋</div>';
    return;
  }
  container.innerHTML = keys.map(key => {
    const day = state[key];
    const doneMeals = Object.keys(day.meals || {}).length;
    const weigh = day.weigh;
    const photos = Object.values(day.photos || {});
    const [y, m, d] = key.split('-');
    const dateLabel = `${d}/${m}/${y}`;
    return `
      <div class="history-entry">
        <div class="history-date">📅 ${dateLabel}</div>
        <div class="history-row"><span>ארוחות שבוצעו</span><span>${doneMeals} / ${MEALS.length}</span></div>
        ${weigh ? `<div class="history-row"><span>משקל</span><span>${weigh.weight} ק"ג</span></div>` : ''}
        ${photos.length ? `<div class="history-photos">${photos.slice(0,4).map(p => `<img src="${p}"/>`).join('')}</div>` : ''}
      </div>`;
  }).join('');
}

// ===================== TOAST =====================
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
